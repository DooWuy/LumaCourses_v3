spring:
    application:
        name: LumaCoursesV2

    datasource:
        url: ${DB_URL:jdbc:postgresql://localhost:5432/luma_courses_v3}
        username: ${DB_USERNAME}
        password: ${DB_PASSWORD}
        driver-class-name: org.postgresql.Driver


        jpa:
            hibernate:
                ddl-auto: update
            open-in-view: false
            properties:
                hibernate:
                    format_sql: true

        sql:
            init:
                mode: never

    logging:
        level:
            org.hibernate.SQL: info
